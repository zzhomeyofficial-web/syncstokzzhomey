<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZZHomey Stock Monitor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-dashboard="public" data-data-url="/data/stock.json">
    <main class="page">
      <section class="hero">
        <p class="eyebrow">ZZHOMEY LIVE STOCK</p>
        <h1>Stok Ready Gudang ZZhomey</h1>
        <p id="statusText" class="status">Memuat data...</p>
        <p class="status">Update Terakhir</p>
        <p id="generatedDate" class="status">-</p>
        <p id="generatedTime" class="update-time">-</p>
        <p id="nextUpdate" class="next-update">update selanjutnya -</p>
        <a class="internal-link-btn" href="https://zzhomey.com/stok-internal">Masuk Sebagai Owner</a>
        
      </section>

      <section class="panel">
        <div class="panel-head">
          <input id="searchInput" type="text" placeholder="Cari Produk / SKU / Warna Produk" />
          <select id="sortSelect" aria-label="Urutkan produk">
            <option value="stock_desc">Stok Terbanyak</option>
            <option value="stock_asc">Stok Tersedikit</option>
          </select>
          <select id="sizeSelect" aria-label="Filter size">
            <option value="__all__">Semua Size</option>
            <option value="XXS">XXS</option>
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
            <option value="XXXL">XXXL</option>
            <option value="XXXXL">XXXXL</option>
          </select>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>
        <div id="categoryTabs" class="category-tabs"></div>
        <div class="list-wrap">
          <div id="productList" class="product-list"></div>
        </div>
      </section>
    </main>

    <script src="./app.js?v=20260516-1"></script>
  </body>
</html>
